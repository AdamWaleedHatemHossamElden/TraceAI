openapi: 3.1.0
info:
  title: TraceAI API
  version: 0.1.0
  description: Phase 1 API contract for the TraceAI backend.
servers:
  - url: http://localhost:5000/api
    description: Local backend API
paths:
  /auth/register:
    post:
      summary: Register a user
      operationId: registerUser
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Request validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Email already exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /auth/login:
    post:
      summary: Login a user
      operationId: loginUser
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: User authenticated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Request validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Credentials are invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /auth/me:
    get:
      summary: Get current user
      operationId: getCurrentUser
      tags:
        - Auth
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"
        "401":
          description: Authentication is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /health:
    get:
      summary: Backend health check
      operationId: getBackendHealth
      tags:
        - Health
      responses:
        "200":
          description: Backend service is available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /health/database:
    get:
      summary: Database health check
      operationId: getDatabaseHealth
      tags:
        - Health
      responses:
        "200":
          description: Database connection is available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatabaseHealthResponse"
        "503":
          description: Database connection is unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /health/ai-service:
    get:
      summary: AI service health check
      operationId: getAiServiceHealth
      tags:
        - Health
      responses:
        "200":
          description: AI service is available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiServiceHealthResponse"
        "503":
          description: AI service is unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      additionalProperties: false
      required:
        - fullName
        - email
        - password
      properties:
        fullName:
          type: string
          minLength: 2
          maxLength: 100
          example: Adam Hatem
        email:
          type: string
          format: email
          example: adam@example.com
        password:
          type: string
          minLength: 8
          maxLength: 72
          format: password
          example: StrongPassword123!
    LoginRequest:
      type: object
      additionalProperties: false
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: adam@example.com
        password:
          type: string
          minLength: 8
          maxLength: 72
          format: password
          example: StrongPassword123!
    PublicUser:
      type: object
      required:
        - id
        - fullName
        - email
        - role
      properties:
        id:
          type: integer
          example: 1
        fullName:
          type: string
          example: Adam Hatem
        email:
          type: string
          format: email
          example: adam@example.com
        role:
          type: string
          enum:
            - user
            - reviewer
            - admin
          example: user
    AuthResponse:
      type: object
      required:
        - user
        - accessToken
        - expiresIn
      properties:
        user:
          $ref: "#/components/schemas/PublicUser"
        accessToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        expiresIn:
          type: string
          example: 1h
    CurrentUserResponse:
      type: object
      required:
        - user
      properties:
        user:
          $ref: "#/components/schemas/PublicUser"
    HealthResponse:
      type: object
      required:
        - status
        - service
        - timestamp
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: traceai-backend
        timestamp:
          type: string
          format: date-time
    DatabaseHealthResponse:
      type: object
      required:
        - status
        - service
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: traceai-database
    AiServiceHealthResponse:
      type: object
      required:
        - status
        - service
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: traceai-ai-service
    ApiError:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              example: VALIDATION_ERROR
            message:
              type: string
              example: The request contains invalid fields.
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                    example: email
                  message:
                    type: string
                    example: Enter a valid email.
