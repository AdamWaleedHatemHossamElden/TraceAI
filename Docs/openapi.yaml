openapi: 3.1.0
info:
  title: TraceAI API
  version: 0.1.0
  description: Phase 1 API contract for the TraceAI backend.
servers:
  - url: http://localhost:5000/api
    description: Local backend API
paths:
  /analyses:
    post:
      summary: Create an analysis
      operationId: createAnalysis
      tags:
        - Analyses
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnalysisRequest"
      responses:
        "201":
          description: Analysis created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResponse"
        "400":
          description: Request validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Authentication is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Project missing or not owned by the authenticated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    get:
      summary: List analyses
      operationId: listAnalyses
      tags:
        - Analyses
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Optional owned project filter.
      responses:
        "200":
          description: Analyses in projects owned by the authenticated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisListResponse"
        "400":
          description: Query validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Authentication is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Filter project missing or not owned by the authenticated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /analyses/{analysisId}:
    parameters:
      - $ref: "#/components/parameters/AnalysisId"
    get:
      summary: Get an analysis
      operationId: getAnalysis
      tags:
        - Analyses
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Analysis returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResponse"
        "400":
          description: Analysis id is invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Authentication is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Analysis missing or not owned by the authenticated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    patch:
      summary: Update an analysis
      operationId: updateAnalysis
      tags:
        - Analyses
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAnalysisRequest"
      responses:
        "200":
          description: Analysis updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResponse"
        "400":
          description: Request validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Authentication is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Analysis missing or not owned by the authenticated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      summary: Delete an analysis
      operationId: deleteAnalysis
      tags:
        - Analyses
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Analysis deleted successfully.
        "400":
          description: Analysis id is invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Authentication is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Analysis missing or not owned by the authenticated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /auth/register:
    post:
      summary: Register a user
      operationId: registerUser
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Request validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Email already exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /auth/login:
    post:
      summary: Login a user
      operationId: loginUser
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: User authenticated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Request validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Credentials are invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /auth/me:
    get:
      summary: Get current user
      operationId: getCurrentUser
      tags:
        - Auth
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"
        "401":
          description: Authentication is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /projects:
    post:
      summary: Create a project
      operationId: createProject
      tags:
        - Projects
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
        "400":
          description: Request validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Authentication is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    get:
      summary: List projects
      operationId: listProjects
      tags:
        - Projects
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Projects owned by the authenticated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListResponse"
        "401":
          description: Authentication is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /projects/{projectId}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      summary: Get a project
      operationId: getProject
      tags:
        - Projects
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Project returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
        "400":
          description: Project id is invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Authentication is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Project missing or not owned by the authenticated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    patch:
      summary: Update a project
      operationId: updateProject
      tags:
        - Projects
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: Project updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
        "400":
          description: Request validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Authentication is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Project missing or not owned by the authenticated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      summary: Delete a project
      operationId: deleteProject
      tags:
        - Projects
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Project deleted successfully.
        "400":
          description: Project id is invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Authentication is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Project missing or not owned by the authenticated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /documents:
    post:
      summary: Upload an evidence document
      operationId: uploadDocument
      tags:
        - Documents
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - projectId
                - file
              properties:
                projectId:
                  type: integer
                  minimum: 1
                file:
                  type: string
                  format: binary
            encoding:
              file:
                contentType: application/pdf, text/plain
      responses:
        "201":
          description: Document uploaded, extracted, and chunked successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentResponse"
        "400":
          description: Request, file, or multipart validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Authentication is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Project missing or not owned by the authenticated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "413":
          description: File exceeds the configured upload size limit.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "422":
          description: Text could not be extracted from the uploaded document.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    get:
      summary: List documents
      operationId: listDocuments
      tags:
        - Documents
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Optional owned project filter.
      responses:
        "200":
          description: Documents in projects owned by the authenticated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentListResponse"
        "400":
          description: Query validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Authentication is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Filter project missing or not owned by the authenticated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /documents/{documentId}:
    parameters:
      - $ref: "#/components/parameters/DocumentId"
    get:
      summary: Get document metadata
      operationId: getDocument
      tags:
        - Documents
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Document metadata returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentResponse"
        "400":
          description: Document id is invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Authentication is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Document missing or not owned by the authenticated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      summary: Delete a document
      operationId: deleteDocument
      tags:
        - Documents
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Document deleted successfully.
        "400":
          description: Document id is invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Authentication is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Document missing or not owned by the authenticated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /documents/{documentId}/content:
    parameters:
      - $ref: "#/components/parameters/DocumentId"
    get:
      summary: Get extracted document chunks
      operationId: getDocumentContent
      tags:
        - Documents
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Extracted chunks returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentContentResponse"
        "400":
          description: Document id is invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Authentication is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Document missing or not owned by the authenticated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Document has not been processed successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /health:
    get:
      summary: Backend health check
      operationId: getBackendHealth
      tags:
        - Health
      responses:
        "200":
          description: Backend service is available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /health/database:
    get:
      summary: Database health check
      operationId: getDatabaseHealth
      tags:
        - Health
      responses:
        "200":
          description: Database connection is available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatabaseHealthResponse"
        "503":
          description: Database connection is unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /health/ai-service:
    get:
      summary: AI service health check
      operationId: getAiServiceHealth
      tags:
        - Health
      responses:
        "200":
          description: AI service is available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiServiceHealthResponse"
        "503":
          description: AI service is unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  parameters:
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      description: Positive project id.
    AnalysisId:
      name: analysisId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      description: Positive analysis id.
    DocumentId:
      name: documentId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      description: Positive document id.
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      additionalProperties: false
      required:
        - fullName
        - email
        - password
      properties:
        fullName:
          type: string
          minLength: 2
          maxLength: 100
          example: Adam Hatem
        email:
          type: string
          format: email
          example: adam@example.com
        password:
          type: string
          minLength: 8
          maxLength: 72
          format: password
          example: StrongPassword123!
    LoginRequest:
      type: object
      additionalProperties: false
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: adam@example.com
        password:
          type: string
          minLength: 8
          maxLength: 72
          format: password
          example: StrongPassword123!
    PublicUser:
      type: object
      required:
        - id
        - fullName
        - email
        - role
      properties:
        id:
          type: integer
          example: 1
        fullName:
          type: string
          example: Adam Hatem
        email:
          type: string
          format: email
          example: adam@example.com
        role:
          type: string
          enum:
            - user
            - reviewer
            - admin
          example: user
    AuthResponse:
      type: object
      required:
        - user
        - accessToken
        - expiresIn
      properties:
        user:
          $ref: "#/components/schemas/PublicUser"
        accessToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        expiresIn:
          type: string
          example: 1h
    CurrentUserResponse:
      type: object
      required:
        - user
      properties:
        user:
          $ref: "#/components/schemas/PublicUser"
    Project:
      type: object
      required:
        - id
        - name
        - description
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          minLength: 1
          maxLength: 255
          example: Project name
        description:
          type:
            - string
            - "null"
          example: Optional description
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateProjectRequest:
      type: object
      additionalProperties: false
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          example: Project name
        description:
          type:
            - string
            - "null"
          example: Optional description
    UpdateProjectRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          example: Updated project name
        description:
          type:
            - string
            - "null"
          example: Updated description
    ProjectResponse:
      type: object
      required:
        - project
      properties:
        project:
          $ref: "#/components/schemas/Project"
    ProjectListResponse:
      type: object
      required:
        - projects
      properties:
        projects:
          type: array
          items:
            $ref: "#/components/schemas/Project"
    AnalysisStatus:
      type: string
      enum:
        - draft
        - queued
        - processing
        - completed
        - failed
      example: draft
    Analysis:
      type: object
      required:
        - id
        - projectId
        - projectName
        - prompt
        - aiResponse
        - modelName
        - topic
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          example: 1
        projectId:
          type: integer
          example: 1
        projectName:
          type: string
          example: Climate Verification
        prompt:
          type: string
          minLength: 1
          maxLength: 50000
          example: What caused the recent temperature increase?
        aiResponse:
          type: string
          minLength: 1
          maxLength: 750000
          example: The AI-generated answer to verify.
        modelName:
          type:
            - string
            - "null"
          maxLength: 255
          example: GPT-4
        topic:
          type:
            - string
            - "null"
          maxLength: 255
          example: Climate
        status:
          $ref: "#/components/schemas/AnalysisStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    AnalysisListItem:
      type: object
      required:
        - id
        - projectId
        - projectName
        - prompt
        - modelName
        - topic
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          example: 1
        projectId:
          type: integer
          example: 1
        projectName:
          type: string
          example: Climate Verification
        prompt:
          type: string
          example: What caused the recent temperature increase?
        modelName:
          type:
            - string
            - "null"
          example: GPT-4
        topic:
          type:
            - string
            - "null"
          example: Climate
        status:
          $ref: "#/components/schemas/AnalysisStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateAnalysisRequest:
      type: object
      additionalProperties: false
      required:
        - projectId
        - prompt
        - aiResponse
      properties:
        projectId:
          type: integer
          minimum: 1
          example: 1
        prompt:
          type: string
          minLength: 1
          maxLength: 50000
          example: What caused the recent temperature increase?
        aiResponse:
          type: string
          minLength: 1
          maxLength: 750000
          example: The AI-generated answer to verify.
        modelName:
          type:
            - string
            - "null"
          maxLength: 255
          example: GPT-4
        topic:
          type:
            - string
            - "null"
          maxLength: 255
          example: Climate
    UpdateAnalysisRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        prompt:
          type: string
          minLength: 1
          maxLength: 50000
          example: Updated prompt
        aiResponse:
          type: string
          minLength: 1
          maxLength: 750000
          example: Updated AI-generated answer.
        modelName:
          type:
            - string
            - "null"
          maxLength: 255
          example: GPT-4
        topic:
          type:
            - string
            - "null"
          maxLength: 255
          example: Climate
    AnalysisResponse:
      type: object
      required:
        - analysis
      properties:
        analysis:
          $ref: "#/components/schemas/Analysis"
    AnalysisListResponse:
      type: object
      required:
        - analyses
      properties:
        analyses:
          type: array
          items:
            $ref: "#/components/schemas/AnalysisListItem"
    DocumentProcessingStatus:
      type: string
      enum:
        - uploaded
        - extracting
        - processed
        - failed
      example: processed
    Document:
      type: object
      description: Document metadata. The storage key and absolute filesystem path are never exposed.
      required:
        - id
        - projectId
        - projectName
        - originalFilename
        - mimeType
        - fileSizeBytes
        - processingStatus
        - chunkCount
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          example: 1
        projectId:
          type: integer
          example: 1
        projectName:
          type: string
          example: Climate Verification
        originalFilename:
          type: string
          example: evidence.pdf
        mimeType:
          type: string
          enum:
            - application/pdf
            - text/plain
          example: application/pdf
        fileSizeBytes:
          type: integer
          example: 123456
        processingStatus:
          $ref: "#/components/schemas/DocumentProcessingStatus"
        chunkCount:
          type: integer
          example: 4
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    DocumentChunk:
      type: object
      required:
        - id
        - chunkIndex
        - content
        - pageNumber
        - charStart
        - charEnd
      properties:
        id:
          type: integer
          example: 1
        chunkIndex:
          type: integer
          example: 0
        content:
          type: string
          example: Extracted evidence text.
        pageNumber:
          type:
            - integer
            - "null"
          example: null
        charStart:
