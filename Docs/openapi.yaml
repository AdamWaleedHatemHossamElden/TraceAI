openapi: 3.1.0
info:
  title: TraceAI API
  version: 0.1.0
  description: Phase 1 API contract for the TraceAI backend.
servers:
  - url: http://localhost:5000/api
    description: Local backend API
paths:
  /auth/register:
    post:
      summary: Register a user
      operationId: registerUser
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Request validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Email already exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /auth/login:
    post:
      summary: Login a user
      operationId: loginUser
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: User authenticated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Request validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Credentials are invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /auth/me:
    get:
      summary: Get current user
      operationId: getCurrentUser
      tags:
        - Auth
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"
        "401":
          description: Authentication is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /projects:
    post:
      summary: Create a project
      operationId: createProject
      tags:
        - Projects
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
        "400":
          description: Request validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Authentication is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    get:
      summary: List projects
      operationId: listProjects
      tags:
        - Projects
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Projects owned by the authenticated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListResponse"
        "401":
          description: Authentication is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /projects/{projectId}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      summary: Get a project
      operationId: getProject
      tags:
        - Projects
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Project returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
        "400":
          description: Project id is invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Authentication is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Project missing or not owned by the authenticated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    patch:
      summary: Update a project
      operationId: updateProject
      tags:
        - Projects
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: Project updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectResponse"
        "400":
          description: Request validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Authentication is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Project missing or not owned by the authenticated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      summary: Delete a project
      operationId: deleteProject
      tags:
        - Projects
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Project deleted successfully.
        "400":
          description: Project id is invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Authentication is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Project missing or not owned by the authenticated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /health:
    get:
      summary: Backend health check
      operationId: getBackendHealth
      tags:
        - Health
      responses:
        "200":
          description: Backend service is available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /health/database:
    get:
      summary: Database health check
      operationId: getDatabaseHealth
      tags:
        - Health
      responses:
        "200":
          description: Database connection is available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatabaseHealthResponse"
        "503":
          description: Database connection is unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /health/ai-service:
    get:
      summary: AI service health check
      operationId: getAiServiceHealth
      tags:
        - Health
      responses:
        "200":
          description: AI service is available.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiServiceHealthResponse"
        "503":
          description: AI service is unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  parameters:
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      description: Positive project id.
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      additionalProperties: false
      required:
        - fullName
        - email
        - password
      properties:
        fullName:
          type: string
          minLength: 2
          maxLength: 100
          example: Adam Hatem
        email:
          type: string
          format: email
          example: adam@example.com
        password:
          type: string
          minLength: 8
          maxLength: 72
          format: password
          example: StrongPassword123!
    LoginRequest:
      type: object
      additionalProperties: false
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: adam@example.com
        password:
          type: string
          minLength: 8
          maxLength: 72
          format: password
          example: StrongPassword123!
    PublicUser:
      type: object
      required:
        - id
        - fullName
        - email
        - role
      properties:
        id:
          type: integer
          example: 1
        fullName:
          type: string
          example: Adam Hatem
        email:
          type: string
          format: email
          example: adam@example.com
        role:
          type: string
          enum:
            - user
            - reviewer
            - admin
          example: user
    AuthResponse:
      type: object
      required:
        - user
        - accessToken
        - expiresIn
      properties:
        user:
          $ref: "#/components/schemas/PublicUser"
        accessToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        expiresIn:
          type: string
          example: 1h
    CurrentUserResponse:
      type: object
      required:
        - user
      properties:
        user:
          $ref: "#/components/schemas/PublicUser"
    Project:
      type: object
      required:
        - id
        - name
        - description
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          minLength: 1
          maxLength: 255
          example: Project name
        description:
          type:
            - string
            - "null"
          example: Optional description
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateProjectRequest:
      type: object
      additionalProperties: false
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          example: Project name
        description:
          type:
            - string
            - "null"
          example: Optional description
    UpdateProjectRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          example: Updated project name
        description:
          type:
            - string
            - "null"
          example: Updated description
    ProjectResponse:
      type: object
      required:
        - project
      properties:
        project:
          $ref: "#/components/schemas/Project"
    ProjectListResponse:
      type: object
      required:
        - projects
      properties:
        projects:
          type: array
          items:
            $ref: "#/components/schemas/Project"
    HealthResponse:
      type: object
      required:
        - status
        - service
        - timestamp
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: traceai-backend
        timestamp:
          type: string
          format: date-time
    DatabaseHealthResponse:
      type: object
      required:
        - status
        - service
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: traceai-database
    AiServiceHealthResponse:
      type: object
      required:
        - status
        - service
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: traceai-ai-service
    ApiError:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              example: VALIDATION_ERROR
            message:
              type: string
              example: The request contains invalid fields.
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                    example: email
                  message:
                    type: string
                    example: Enter a valid email.
