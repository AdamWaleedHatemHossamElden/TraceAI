services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-traceai}
      MYSQL_USER: ${MYSQL_USER:-traceai_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_me_locally}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_me_root_locally}
    ports:
      - "3306:3306"
    volumes:
      - traceai_mysql_data:/var/lib/mysql
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: development
      BACKEND_PORT: 5000
      BACKEND_API_PREFIX: /api
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_NAME: ${MYSQL_DATABASE:-traceai}
      DATABASE_USER: ${MYSQL_USER:-traceai_user}
      DATABASE_PASSWORD: ${MYSQL_PASSWORD:-change_me_locally}
      JWT_SECRET: ${JWT_SECRET:-replace_with_local_secret}
      AI_SERVICE_URL: http://ai-service:8000
      UPLOAD_STORAGE_PATH: /app/storage/uploads
    ports:
      - "5000:5000"
    volumes:
      - ./backend/src:/app/src
      - traceai_uploads:/app/storage/uploads

  ai-service:
    build:
      context: ./ai-service
    environment:
      AI_SERVICE_NAME: traceai-ai-service
    ports:
      - "8000:8000"

volumes:
  traceai_mysql_data:
  traceai_uploads:
